{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f3f0f0;
    font-family: Arial;
}

.login-card {
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.login-title {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* 🔥 FIX */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.tab-buttons {
    display: flex;
    margin-bottom: 15px;
}

.tab-buttons button {
    flex: 1;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #eee;
}

.tab-buttons .active {
    background: black;
    color: white;
}

.login-btn {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    margin-top: 10px;
    border-radius: 6px;
}

.login-btn:disabled { background: gray; cursor: not-allowed; }

.error { color: red; font-size: 14px; margin-top:5px; }

.forgot, .signup {
    margin-top: 10px;
    text-align: center;
}

.forgot a, .signup a {
    color: #007bff;
    text-decoration: none;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-card">

<h2 class="login-title">Login</h2>

<!-- Tabs -->
<div class="tab-buttons">
    <button type="button" class="tab-btn active" onclick="showTab('password', this)">Password</button>
    <button type="button" class="tab-btn" onclick="showTab('otp', this)">OTP</button>
</div>

<!-- PASSWORD LOGIN -->
<div id="password" class="tab-content active">
<form method="POST">
{% csrf_token %}

<div class="form-group">
    <input type="text" name="email_or_mobile"
        placeholder="{% if MOBILE_OTP_ENABLED %}Enter Email or Mobile{% else %}Enter Email{% endif %}"
        required>
</div>

<div class="form-group">
    <input type="password" name="password" placeholder="Enter Password" required>
</div>

<button type="submit" name="password_login" class="login-btn">Login</button>

<div class="forgot">
    <a href="{% url 'base:forgot_password' %}">Forgot Password?</a>
</div>

<div class="signup">
    <a href="{% url 'base:signup' %}">New User? Create an Account</a>
</div>

</form>
</div>

<!-- OTP LOGIN -->
<div id="otp" class="tab-content">

{% if not otp_section %}
<form method="POST">
{% csrf_token %}

<div class="form-group">
    <input type="text" name="email_or_mobile"
        placeholder="{% if MOBILE_OTP_ENABLED %}Enter Email or Mobile{% else %}Enter Email{% endif %}"
        required>
</div>

<button type="submit" name="send_otp" class="login-btn">Send OTP</button>
</form>

{% else %}
<form method="POST">
{% csrf_token %}
<input type="hidden" name="contact" value="{{ contact }}">

<div class="form-group">
    <input type="text" name="otp" placeholder="Enter OTP" required>
</div>

<button type="submit" name="verify" class="login-btn">Verify OTP</button>
</form>

<form method="POST">
{% csrf_token %}
<input type="hidden" name="contact" value="{{ contact }}">
<button type="submit" name="resend" class="login-btn" {% if resend_disabled %}disabled{% endif %}>
Resend OTP
</button>
</form>
{% endif %}

</div>

<!-- Messages -->
{% if messages %}
<div class="error">
{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
</div>
{% endif %}

</div>

<script>
function showTab(tabId, btn) {

    // hide all tabs
    document.querySelectorAll(".tab-content").forEach(tab => {
        tab.classList.remove("active");
    });

    // remove active from buttons
    document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.remove("active");
    });

    // show selected tab
    document.getElementById(tabId).classList.add("active");

    // highlight button
    btn.classList.add("active");
}
</script>

</body>
</html>
